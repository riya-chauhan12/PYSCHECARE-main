name: Welcome New Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to PsycheCare! 🎉 Thank you for opening your first issue here. A maintainer will review it shortly."
          pr-message: "Hello and welcome to PsycheCare! 🚀 Thank you for taking the time to submit your first Pull Request! We'll review your code as soon as possible."

