name: 🔨 Ban Hammer
on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, synchronize]
permissions:
  issues: write
  pull-requests: write
jobs:
  auto-close-banned:
    runs-on: ubuntu-latest
    steps:
      - name: Check and Close Banned Users
        uses: actions/github-script@v7
        with:
          script: |
            const bannedUsers = ['atul-upadhyay-7'];
            const actor = context.actor;
            
            if (bannedUsers.includes(actor)) {
              console.log(`Banned user detected: @${actor}`);
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              
              const commentBody = `## 🛑 Contribution Blocked\n\nHi @${actor},\n\nThis repository does not accept contributions from this account due to repeated spam or community guideline violations.\n\nThis issue/PR has been automatically closed.`;
              
              if (context.payload.issue) {
                const issueNum = context.payload.issue.number;
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum, body: commentBody
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNum, state: 'closed'
                });
              } else if (context.payload.pull_request) {
                const prNum = context.payload.pull_request.number;
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNum, body: commentBody
                });
                await github.rest.pulls.update({
                  owner, repo, pull_number: prNum, state: 'closed'
                });
              }
            } else {
              console.log(`User @${actor} is not on the banned list. Proceeding normally.`);
            }
