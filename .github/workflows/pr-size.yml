name: PR Size Labeler
on: [pull_request_target]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Label PR based on size
        uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

