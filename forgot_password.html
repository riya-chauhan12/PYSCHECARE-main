<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PsycheCare</title>

    <script src="https://kit.fontawesome.com/1b2b6a64da.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Images/B_icon01.png">
    <style>
        .reset-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background-color: var(--light-color);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(127, 90, 240, 0.2);
            animation: fadeIn 0.8s ease forwards;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .reset-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #6a4cc7;
        }

        .return-links {
            text-align: center;
            margin-top: 1rem;
        }

        .return-links a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .return-links a:hover {
            text-decoration: underline;
        }

        .success-message {
            color: #2ecc71;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }

        .info-message {
            background: #eef2ff;
            color: #4a5568;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-cantainer">
            <h2 class="logo">PsycheCare.</h2>
        </div>
        <div class="nav-and-btn-cont">
            <div class="nav-list-cont">
                <ul class="nav-ul">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="index.html#section-3">CHAT BOT</a></li>
                    <li><a href="otherHTML/statistics.html">STATISTICS</a></li>
                    <li><a href="index.html#footer">CONTACT</a></li>
                    <li><a href="login.html">LOGIN</a></li>
                </ul>
            </div>
            <div class="hamburger">
                <diV class="line line1"></diV>
                <div class="mid-line-cont">
                    <div class="line mid-line1"></div>
                    <div class="line mid-line2"></div>
                </div>
                <diV class="line line3"></diV>
            </div>
        </div>
    </div>

    <div class="mobile-view-nav-cont" id="mobile-nav">
        <div class="mobile-view-nav-head">
            <p>Menu</p>
        </div>
        <div class="mobile-view-nav-list">
            <ul>
                <li><a href="index.html" class="mobile-view-list">HOME</a></li>
                <li><a href="index.html#section-3" class="mobile-view-list">CHAT BOT</a></li>
                <li><a href="otherHTML/statistics.html" class="mobile-view-list">STATISTICS</a></li>
                <li><a href="index.html#footer" class="mobile-view-list">CONTACT</a></li>
                <li><a href="login.html" class="mobile-view-list">LOGIN</a></li>
            </ul>
        </div>
    </div>

    <div class="reset-container">
        <div class="reset-header">
            <h2 style="color: var(--dark-color);">Reset <span style="color: var(--primary-color);">Password</span></h2>
        </div>

        <div class="info-message">
            Enter your registered email address and we'll send you a link to reset your password.
        </div>

        <form method="POST" action="forgot_password.php" class="reset-form" id="reset-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="reset-btn" id="submit-btn">Send Reset Link</button>
            <p class="success-message" id="success-msg"></p>
        </form>

        <div class="return-links">
            <p><a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <script src="otherJS/hamberger.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const err = urlParams.get('error');
        const successMsg = document.getElementById('success-msg');
        const submitBtn = document.getElementById('submit-btn');

        if (urlParams.get('sent') === '1') {
            document.getElementById('reset-form').style.display = 'none';
            document.querySelector('.info-message').textContent =
                'If an account with that email exists, a password reset link has been sent. Please check your inbox.';
            document.querySelector('.info-message').style.background = '#d4edda';
            document.querySelector('.info-message').style.color = '#155724';
        }

        if (err === 'rate_limit') {
            successMsg.textContent = 'Too many requests. Please try again in 15 minutes.';
            successMsg.style.color = '#e74c3c';
            successMsg.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
        }

        fetch('csrf.php')
            .then(response => response.json())
            .then(data => {
                const forms = document.querySelectorAll('form');
                forms.forEach(form => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'csrf_token';
                    input.value = data.csrf_token;
                    form.appendChild(input);
                });
            })
            .catch(error => console.error('Error fetching CSRF token:', error));
    </script>
    <script src="otherJS/accessibility.js"></script>
</body>
</html>
